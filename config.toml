# =============================================================================
# Synesis2Graph Configuration
# =============================================================================
# This file configures backend connections for the synesis2graph.py pipeline.
#
# Usage:
#   python synesis2graph.py --project ./project.synp --backend neo4j --config config.toml
#   python synesis2graph.py --project ./project.synp --backend graphqlite --config config.toml
#
# Documentation: https://synesis-lang.github.io/synesis-docs
# =============================================================================

[neo4j]
# Neo4j connection settings
#
# uri: Connection URI (bolt:// for local, neo4j+s:// for Aura)
# user: Database username
# password: Database password
# database: Target database name (optional, auto-created from project name)

uri = "bolt://127.0.0.1:7687"
user = "neo4j"
password = "CH240120ch!"
database = "factors"  # Optional: overrides project-based naming

[graphqlite]
# GraphQLite (SQLite) connection settings
#
# db_path: Target SQLite database file. Supports placeholder {project}
#          where {project} is replaced by the .synp filename stem.
# extension_path: Optional path to a custom GraphQLite extension binary.

db_path = "./graphs/{project}.db"
# extension_path = "C:/path/to/graphqlite_extension"
